backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "resources"
    label: "SK Digital Academy — Resources"
    label_singular: "Resource"
    folder: "content/resources"
    create: true
    slug: "{{slug}}"
    format: "json"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Notes", "Past Papers", "Guide", "Video", "Other"]
        default: "Notes"
      - { label: "Cover Image (optional)", name: "image", widget: "image", required: false }
      - { label: "Upload File (PDF, etc.)", name: "file", widget: "file", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime", default: "" }
